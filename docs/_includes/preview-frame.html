<figure class="preview-frame {% if include.large %}preview-frame-large{% endif %} {% if include.preview_class %}{{ include.preview_class }}{% endif %}">
  <div class="preview-frame-media">
    <img src="{{ include.src | relative_url }}" alt="{{ include.alt }}" loading="lazy" data-preview-image />
    <div class="preview-frame-fallback" hidden>
      <p class="meta-label">Preview unavailable</p>
      <p>{{ include.alt | default: 'Preview asset unavailable for this route.' }}</p>
    </div>
  </div>
  {% if include.caption %}
    <figcaption>{{ include.caption }}</figcaption>
  {% endif %}
</figure>
