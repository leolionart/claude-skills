title: Design Skills
description: Public gallery of design styles with dedicated detail demos for each direction.
repo_version: v1.3.0
brand:
  eyebrow: Claude Code design intelligence
  label: Design Skills
header:
  links:
    - label: Styles
      url: /
home:
  eyebrow: Style library
  title: Pick a design style, then open its full demo page.
  summary: The homepage is now a clean index of visual directions. Each card leads straight into a dedicated detail page showing the same product rendered in a distinct style.
  primary_cta:
    label: Browse styles
    url: /#gallery
  highlights:
    - 4 distinct design directions
    - 1 shared product scenario
    - Detail pages with full visual demos
  featured_preview:
    src: /assets/img/previews/premium-polish/hero.svg
    alt: Featured preview of a premium workspace interface from one of the design style demos.
    caption: Start from the style list, then go deeper inside the dedicated demo page for each direction.
  note:
    title: One homepage, four style routes
    body: Use the homepage to compare directions at a glance, then open a style page to inspect its hero, sections, visual rhythm, and demo artifacts.
  gallery:
    eyebrow: Design styles
    title: Choose a direction.
    summary: Every card opens a dedicated detail page for the same Northstar Workspace scenario, making the comparison about style rather than product scope.
footer:
  summary: Public gallery for the repo’s design style demos.
  links:
    - label: Styles
      url: /
  meta:
    - Each style detail page is rendered from design_ui_modes.yml.
    - The homepage only lists styles and routes into their demos.
same_scenario:
  eyebrow: One product, four renderings
  title: Northstar Workspace is the shared demo product.
  description: Every style page re-renders the same fictional workspace product so the comparison stays honest. Navigation, content modules, and product scope stay stable while typography, spacing, depth, palette, and composition shift by style.
  product_name: Northstar Workspace
  product_summary: A hybrid docs, dashboard, and workflow product with a top bar, left navigation, KPI summary, project modules, a planning view, and a task table.
  compare_axes:
    - Hero composition
    - Section rhythm
    - Density and spacing
    - Typography posture
    - Artifact staging
    - Scene layout
