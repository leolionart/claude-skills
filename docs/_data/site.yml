title: Design Skills
description: Gallery-style public showcase for the repo’s design directions and demo case studies.
repo_version: v1.3.0
brand:
  eyebrow: Claude Code design intelligence
  label: Design Skills
header:
  links:
    - label: Styles
      url: /
home:
  eyebrow: Curated style gallery
  title: Four visual directions. One shared product story.
  summary: Browse the wall like a design gallery, then open a mode to see the same Northstar Workspace scenario restaged as a full visual case study.
  primary_cta:
    label: Browse the gallery
    url: /#gallery
  highlights:
    - 4 authored design directions
    - Preview-first gallery wall
    - Detail pages staged like case studies
  featured_preview:
    src: /assets/img/previews/premium-polish/hero.svg
    alt: Featured preview from the premium polish style demo showing a layered workspace reveal.
    caption: Open a direction to move from the gallery wall into a full showcase page.
  note:
    title: One scenario, four authored cuts
    body: The homepage is for browsing. Each style page pushes the same product through a different visual language, pacing, and material treatment.
  gallery:
    eyebrow: Gallery wall
    title: Pick the cut you want to study.
    summary: Every tile leads to a dedicated showcase page for the same Northstar Workspace product, so the comparison stays about presentation, not feature scope.
footer:
  summary: Public gallery and case-study showcase for the repo’s design directions.
  links:
    - label: Styles
      url: /
  meta:
    - Each style detail page is rendered from design_ui_modes.yml.
    - The homepage is a visual gallery wall that routes into dedicated showcase demos.
same_scenario:
  eyebrow: One product, four renderings
  title: Northstar Workspace is the shared demo product.
  description: Every style page re-renders the same fictional workspace product so the comparison stays honest. Navigation, content modules, and product scope stay stable while typography, spacing, depth, palette, and composition shift by style.
  product_name: Northstar Workspace
  product_summary: A hybrid docs, dashboard, and workflow product with a top bar, left navigation, KPI summary, project modules, a planning view, and a task table.
  compare_axes:
    - Hero composition
    - Section rhythm
    - Density and spacing
    - Typography posture
    - Artifact staging
    - Scene layout
