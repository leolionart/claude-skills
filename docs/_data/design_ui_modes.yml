- slug: default-high-agency
  label: default high-agency
  short_label: Default
  mode_number: "Mode 1"
  summary: General premium UI work with asymmetric momentum and launch-grade hierarchy.
  positioning: The broad default for new pages, components, dashboards, and polish passes when the user wants premium quality without forcing a narrower preset.
  use_when: New pages, components, dashboards, or general polish requests.
  core_behavior: Favor anti-generic layout, strong typography, controlled motion, and bold compositional variance.
  best_for:
    - New UI work
    - General premium polish
    - Asymmetric composition
    - Strong visual hierarchy
  signals:
    - asymmetry
    - scale jumps
    - offset command surfaces
    - momentum ribbons
  primary_language:
    - asymmetry
  supporting_treatments:
    - subtle colored shadows
    - semi-flat depth
  imagery_mode:
    - abstract geometrical
  avoid_list:
    - purple/blue AI gradients
    - generic centered heroes
    - repetitive 3-card rows
    - dead-flat motion
  compare_note: Choose this when you want the broadest premium direction instead of a quieter editorial or more technical frame.
  related:
    - minimalist editorial
    - premium polish
  preview_asset: /assets/img/previews/default-high-agency/hero.svg
  preview_alt: Default high-agency preview showing an asymmetric workspace dashboard with bold hierarchy and energetic composition.
  prompt_key: default_high_agency
  page_class: theme-default-high-agency
  preview_caption: Bold hierarchy, asymmetry, and premium pacing on the same workspace scenario.
  microsite:
    hero:
      eyebrow: Canonical mode demo
      title: The same workspace, rendered with launch-grade pressure and asymmetric momentum.
      lead: "This is the broadest expression of design-ui: energetic hierarchy, offset composition, and a sense that the product is already shipping with conviction."
      primary_cta_label: Copy the canonical prompt
      secondary_cta_label: Compare all 4 modes
      microproof:
        - One skill, not four separate skills
        - Same product scope as every other mode
        - Best when direction needs confidence without over-specializing
    visual_kit:
      hero_asset:
        src: /assets/img/previews/default-high-agency/hero.svg
        alt: Default high-agency hero stage with bold hierarchy and a command-center launch composition.
        caption: The hero behaves like a product launch stage, not a documentation summary card.
      detail_assets:
        - src: /assets/img/previews/default-high-agency/scene-a.svg
          alt: Default high-agency detail scene showing offset planning modules and KPI fragments.
          caption: Offset planning fragments and hierarchy jumps keep the eye moving.
        - src: /assets/img/previews/default-high-agency/scene-b.svg
          alt: Default high-agency detail scene showing command center cards with layered urgency.
          caption: Command-center fragments add pressure, rhythm, and selective density.
      motif_asset:
        src: /assets/img/previews/default-high-agency/motif.svg
        alt: Default high-agency motif asset with ribbons and directional launch geometry.
        caption: Directional ribbons and offsets reinforce the mode’s sense of momentum.
    sections:
      - type: manifesto_split
        eyebrow: Mode thesis
        title: The default mode should feel like the product already has market confidence.
        lead: Default high-agency is the “start here” rendering when the brief asks for premium quality but the exact house style is still open.
        body: The point is not decoration. It is using hierarchy jumps, asymmetry, and selective pressure so Northstar Workspace feels deliberate from the first screen instead of safe, centered, and over-explained.
        notes:
          - Offset composition over centered symmetry
          - Strong CTA lane, not equal-weight modules
          - Density shifts create scan rhythm
      - type: artifact_stage
        eyebrow: Artifact stage
        title: Mission control hero
        description: "The first fold frames Northstar Workspace like a launch surface: one dominant story panel, one supporting readout, and one offset action lane."
        asset:
          src: /assets/img/previews/default-high-agency/hero.svg
          alt: Default high-agency artifact stage with launch-like hero and asymmetric dashboard modules.
          caption: The hero carries the mode’s biggest hierarchy jump.
        callout:
          title: Why it works
          body: The product reads as opinionated because one idea wins immediately. Supporting information is staggered around it instead of flattened into equivalent cards.
        signals:
          - offset hero blocks
          - bold type scale
          - high-priority CTA lane
      - type: annotated_scene
        eyebrow: Annotated scene
        title: Planning board with pacing shifts
        description: The planning layer alternates dense and quiet zones so the eye travels through strategy, execution, and next actions without getting trapped in a single grid.
        asset:
          src: /assets/img/previews/default-high-agency/scene-a.svg
          alt: Default high-agency planning board scene with alternating density zones.
          caption: The same product scenario, but staged with rhythm and urgency.
        annotations:
          - label: Density jump
            text: Dense KPI fragments sit beside a calmer planning slab to create a high-low pulse.
          - label: Action lane
            text: Primary actions get their own directional lane instead of being buried inside a generic footer.
          - label: Visual pressure
            text: Accent geometry nudges the scan path forward without becoming decorative noise.
      - type: principles_rail
        eyebrow: Principles rail
        title: Composition rules for this rendering
        description: The default mode should be memorable because it feels active, not because it adds more ornament.
        items:
          - title: Let one idea dominate
            body: Start with one oversized statement surface and force the rest of the page to orbit around it.
          - title: Break the card row
            body: Avoid repeating equal tiles. Use offsets, overlaps, and scale contrast to create a premium scan path.
          - title: Use accents directionally
            body: Color and motion cues should push the eye through the interface instead of washing everything evenly.
      - type: proof_strip
        eyebrow: Visual DNA
        title: Signature reads
        description: The mode should be recognizable before the copy is read.
        items:
          - Bold hierarchy shifts
          - Offset composition
          - Premium sans tone
          - Semi-flat depth with energy
      - type: comparison_band
        eyebrow: Avoid framing
        title: Not a fifth workflow. Not a generic marketing skin.
        description: This mode is still the shared Northstar Workspace product. It just expresses the broadest premium stance inside design-ui.
        items:
          - label: Not this
            body: A safe split hero with equally weighted cards and chip spam.
          - label: Use when
            body: The brief needs premium confidence, but not the restraint of editorial calm or the strictness of technical modularity.

- slug: minimalist-editorial
  label: minimalist editorial
  short_label: Editorial
  mode_number: "Mode 2"
  summary: Calm, document-like, warm monochrome compositions led by typography and ruled whitespace.
  positioning: The quiet option for workspace and document-heavy products that should feel precise, composed, and intentionally understated.
  use_when: Workspace tools, document-oriented products, quiet brand systems, and editorial UI.
  core_behavior: Favor warm monochrome palettes, crisp borders, restrained motion, and typographic contrast.
  best_for:
    - Workspace tools
    - Document products
    - Quiet brand systems
    - Monochrome UI
  signals:
    - warm monochrome
    - document rhythm
    - ruled whitespace
    - typographic contrast
  primary_language:
    - Swiss
  supporting_treatments:
    - muted colors
    - hairline borders
  imagery_mode:
    - lineart
  avoid_list:
    - gradients
    - neon
    - heavy shadows
    - oversized pill-heavy components
  compare_note: Choose this when clarity should feel calm and editorial rather than cinematic or high-agency.
  related:
    - default high-agency
    - structured technical
  preview_asset: /assets/img/previews/minimalist-editorial/hero.svg
  preview_alt: Minimalist editorial preview showing a warm monochrome workspace screen with crisp borders and document rhythm.
  prompt_key: minimalist_editorial
  page_class: theme-minimalist-editorial
  preview_caption: Warm monochrome, crisp borders, and document rhythm on the shared workspace scenario.
  microsite:
    hero:
      eyebrow: Canonical mode demo
      title: The same workspace, edited into a calm document-led product surface.
      lead: This rendering makes Northstar Workspace feel precise, thoughtful, and typographically composed. The difference is not product scope. It is the tempo, margin system, and restraint.
      primary_cta_label: Copy the canonical prompt
      secondary_cta_label: Compare all 4 modes
      microproof:
        - Same product as the other three pages
        - Typography and spacing do most of the work
        - Best when calm precision matters more than drama
    visual_kit:
      hero_asset:
        src: /assets/img/previews/minimalist-editorial/hero.svg
        alt: Minimalist editorial hero stage with spread-like composition and wide margins.
        caption: The hero reads like an opening spread rather than a software landing page.
      detail_assets:
        - src: /assets/img/previews/minimalist-editorial/scene-a.svg
          alt: Minimalist editorial detail scene with reading-first workspace columns.
          caption: Reading-first columns and hairline scaffolding replace card-heavy staging.
        - src: /assets/img/previews/minimalist-editorial/scene-b.svg
          alt: Minimalist editorial detail scene with ledger-like task and notes layout.
          caption: The product starts to feel like an editorial ledger, not a dashboard specimen.
      motif_asset:
        src: /assets/img/previews/minimalist-editorial/motif.svg
        alt: Minimalist editorial motif asset with ruled lines and margin note markers.
        caption: Ruled whitespace and margin notes become the supporting visual texture.
    sections:
      - type: manifesto_split
        eyebrow: Mode thesis
        title: Editorial calm comes from composition, not from removing personality.
        lead: Minimalist editorial turns Northstar Workspace into a composed reading environment with a clear margin system and a slower visual tempo.
        body: The product should feel quieter, not emptier. Hairline rules, margin notes, and controlled spacing provide structure so the page reads like a designed document instead of a stripped-down dashboard.
        notes:
          - Margins behave like editorial columns
          - Typography does more work than color
          - Shadows stay minimal and almost invisible
      - type: editorial_columns
        eyebrow: Reading posture
        title: Build the page like a spread, not a panel stack.
        columns:
          - label: Column A
            title: Lead with title blocks and margin cues
            body: Headers, notes, and summaries should align to a calm vertical spine that keeps the reading flow measured.
          - label: Column B
            title: Use ruled whitespace as structure
            body: Empty space is not filler here. It becomes part of the rhythm that separates summary, evidence, and action.
          - label: Column C
            title: Keep materials close to the page
            body: Panels feel almost printed—flat, precise, and intentionally near the background plane.
      - type: artifact_stage
        eyebrow: Artifact stage
        title: Editorial overview spread
        description: The first fold behaves like a carefully laid-out document spread with a title slab, contextual note, and measured information blocks.
        asset:
          src: /assets/img/previews/minimalist-editorial/hero.svg
          alt: Minimalist editorial artifact stage with spread-like workspace composition.
          caption: The first fold feels composed and typographic before it feels “UI”.
        callout:
          title: Why it works
          body: The page earns authority through margin discipline and typographic contrast instead of theatrical effects.
        signals:
          - document rhythm
          - warm monochrome palette
          - restrained focal point
      - type: annotated_scene
        eyebrow: Annotated scene
        title: Quiet planning ledger
        description: Tasks, notes, and schedules are framed like an organized ledger with precise labels and soft accents that never overpower the reading flow.
        asset:
          src: /assets/img/previews/minimalist-editorial/scene-b.svg
          alt: Minimalist editorial planning ledger scene with ruled task organization.
          caption: A ledger-like scene where scanability comes from typography and rules.
        annotations:
          - label: Hairline rule
            text: Rules divide meaning without creating a heavy component shell.
          - label: Margin note
            text: Small notes and captions act like editorial scaffolding rather than dashboard chrome.
          - label: Low shadow
            text: Surfaces stay close to the page so the mode reads calm instead of soft and vague.
      - type: proof_strip
        eyebrow: Visual DNA
        title: Signature reads
        description: The mode should be recognizable through restraint, not emptiness.
        items:
          - Warm monochrome field
          - Crisp hairline borders
          - Typographic contrast first
          - Quiet motion and restraint
      - type: comparison_band
        eyebrow: Avoid framing
        title: Not “less capable.” Not another content product.
        description: It is the same shared workspace demo, rendered with editorial composure instead of premium force or technical explicitness.
        items:
          - label: Not this
            body: Decorative gradients, pill spam, or card stacks pretending to be editorial.
          - label: Use when
            body: The interface should support deep reading, quiet trust, and document-heavy workflows.

