          - label: Not this
            body: Loud gradients, glassmorphism clichés, or glow applied evenly to every surface.
          - label: Use when
            body: The brief asks for a stronger sense of craft, launch energy, and material refinement.

- slug: structured-technical
  label: structured technical
  short_label: Technical
  mode_number: "Mode 4"
  summary: Developer-facing clarity with system-map logic, explicit labels, and stronger trust-first geometry.
  positioning: The clearest mode for docs, developer tools, dashboards, and educational interfaces where scanability and trust matter most.
  use_when: Docs, explainers, developer tools, admin surfaces, workflow UIs, and technical dashboards.
  core_behavior: Favor modular layouts, geometric clarity, lineart, material colors, and restrained ornament.
  best_for:
    - Docs surfaces
    - Developer tools
    - Workflow explainers
    - Technical dashboards
  signals:
    - modular layouts
    - geometric clarity
    - audit overlays
    - explicit labels
  primary_language:
    - modular layouts
  supporting_treatments:
    - material colors
    - lineart
  imagery_mode:
    - isometric
  avoid_list:
    - ornamental textures
    - decorative motion with no information value
    - expressive art references that reduce clarity
    - decorative noise
  compare_note: Choose this when information clarity matters more than premium drama or editorial quietness.
  related:
    - minimalist editorial
    - premium polish
  preview_asset: /assets/img/previews/structured-technical/hero.svg
  preview_alt: Structured technical preview showing a modular workspace dashboard with geometric order and audit-friendly cues.
  prompt_key: structured_technical
  page_class: theme-structured-technical
  preview_caption: Modular grids, geometric order, and trust-first accents on the shared workspace scenario.
  microsite:
