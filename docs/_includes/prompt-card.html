{% assign prompt = site.data.prompts[include.prompt_key] %}
{% assign prompt_id = 'prompt-' | append: include.prompt_key %}
<article class="prompt-card reference-card {% if include.wide %}prompt-card-wide{% endif %}">
  <div class="prompt-card-head">
    <div class="stack-sm">
      <p class="section-kicker">Reference prompt</p>
      <h3>{{ prompt.title }}</h3>
    </div>
    <button class="copy-button" type="button" data-copy-target="{{ prompt_id }}">{{ prompt.button_label }}</button>
  </div>
  <pre id="{{ prompt_id }}"><code>{{ prompt.prompt }}</code></pre>
</article>
