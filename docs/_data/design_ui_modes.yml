            text: Vertical and horizontal rails hold related information together so modules feel systematic.
          - label: Metadata first
            text: Labels, states, and small-status readouts remain visible instead of being collapsed into secondary UI.
          - label: Lineart support
            text: Diagram-like accents clarify relationships without becoming decorative illustration.
      - type: principles_rail
        eyebrow: Principles rail
        title: System rules for this rendering
        description: Clarity should come from structure, not from stripping the product down to emptiness.
        items:
          - title: Teach relationships
            body: Let layout and labels explain how states, tasks, and artifacts connect.
          - title: Make trust visible
            body: Surface audit cues, timestamps, and explicit status treatments where they matter.
          - title: Keep geometry disciplined
            body: Use stricter corners, rails, and module sizes so the page feels dependable and inspectable.
      - type: proof_strip
        eyebrow: Visual DNA
        title: Signature reads
        description: The mode should be recognizable through structure and explainability.
        items:
          - Modular geometry
          - Lineart and labels
          - Material accents for clarity
          - Trust-first scanability
      - type: comparison_band
        eyebrow: Avoid framing
        title: Not a boring fallback. Not another workflow lane.
