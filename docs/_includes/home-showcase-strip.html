<section class="shell section section-showcase home-showcase-strip" id="mode-strip">
  <div class="section-heading stack-md home-section-heading">
    <p class="section-kicker">{{ site.data.site.home_showcase.eyebrow }}</p>
    <h2>{{ site.data.site.home_showcase.title }}</h2>
    <p>{{ site.data.site.home_showcase.description }}</p>
  </div>
  <div class="home-mode-strip" aria-label="Featured design-ui mode gallery">
    {% for mode in site.data.design_ui_modes %}
      {% include mode-card.html mode=mode showcase=true %}
    {% endfor %}
  </div>
</section>
