home:
  eyebrow: Curated public gallery
  title: Four canonical UI demos, one compact front door.
  summary: "The homepage now does one job: get visitors into the design-ui microsites quickly, with just enough framing to make the gallery feel intentional."
  primary_cta:
    label: Browse the gallery
    url: /#gallery
  secondary_cta:
    label: Open archive view
    url: /design-ui/
  highlights:
    - 4 canonical design-ui microsites
    - 1 shared Northstar Workspace scenario
    - 1 audit-first redesign workflow
  featured_preview:
    src: /assets/img/previews/premium-polish/hero.svg
    alt: Curated gallery preview showing a premium workspace hero from the premium polish mode.
    caption: The front door stays compact because the deeper proof already lives inside the microsites.
  note:
    title: Curated, not exhaustive
    body: Start with the four design-ui directions below. Use the archive when you want the same set in a quieter support view, and switch to redesign-skill only when the product already exists in code.
  gallery:
    eyebrow: Canonical mode gallery
    title: Choose the visual direction, then open the microsite.
    summary: Each card routes into the full mode page for the same Northstar Workspace scenario, so the comparison stays about visual language rather than product scope.
  support_strip:
    eyebrow: Supporting routes
    archive:
      title: design-ui archive
      summary: A lean support view of the same four canonical mode cards, useful when you want the gallery without the homepage framing.
      url: /design-ui/
      cta_label: Open archive
    redesign:
      title: redesign-skill workflow
      summary: The audit-first lane for improving an existing shipped interface without turning redesign into another style preset.
      url: /redesign-skill/
      cta_label: Open workflow
footer:
  summary: Gallery-first public docs for the repo’s premium frontend design demos.
  links:
    - label: Gallery
      url: /
