<section class="shell section section-showcase section-mode-block section-mode-editorial-columns">
  <div class="mode-block-heading stack-md">
    <p class="section-kicker">{{ include.section.eyebrow }}</p>
    <h2>{{ include.section.title }}</h2>
  </div>
  <div class="editorial-columns-grid">
    {% for column in include.section.columns %}
      <article class="editorial-column stack-md">
        <p class="meta-label">{{ column.label }}</p>
        <h3>{{ column.title }}</h3>
        <p>{{ column.body }}</p>
      </article>
    {% endfor %}
  </div>
</section>
