<section class="shell section section-showcase section-mode-block section-mode-proof-strip">
  <div class="proof-strip">
    <div class="proof-strip-copy stack-md">
      <p class="section-kicker">{{ include.section.eyebrow }}</p>
      <h2>{{ include.section.title }}</h2>
      <p>{{ include.section.description }}</p>
    </div>
    <div class="proof-strip-list" aria-label="{{ include.section.title }}">
      {% for item in include.section.items %}
        <span>{{ item }}</span>
      {% endfor %}
    </div>
  </div>
</section>
