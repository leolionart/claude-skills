<div class="mode-scene-grid" aria-label="Demo scenes for {{ include.mode.label }}">
  {% for scene in include.mode.microsite.scenes %}
    <article class="mode-scene-card stack-md">
      <p class="section-kicker">{{ scene.eyebrow }}</p>
      <h3>{{ scene.title }}</h3>
      <p>{{ scene.description }}</p>
      {% include taxonomy-chip-list.html items=scene.signals %}
    </article>
  {% endfor %}
</div>
