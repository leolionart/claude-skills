support_pages:
  design_ui:
    eyebrow: Supporting archive
    title: The canonical mode archive.
    summary: This route mirrors the same four design-ui demos in a quieter support-page format. Use it when you want the gallery without the homepage framing.
    primary_cta:
      label: Back to gallery
      url: /
    secondary_cta:
      label: Open workflow lane
      url: /redesign-skill/
    note_title: Archive role
    note_body: The homepage is the curated front door. This page stays useful as a lean archive and comparison route, not as a second landing page.
  redesign:
    eyebrow: Supporting workflow lane
    title: redesign-skill keeps shipped products on a low-risk path.
    summary: Use this route when the interface already exists and the right move is to audit, improve, and verify without swapping frameworks or inventing a new visual language.
    primary_cta:
      label: Back to gallery
      url: /
    secondary_cta:
      label: Browse design-ui modes
      url: /design-ui/
    highlights:
      - Audit the current surface before changing it.
      - Improve the highest-impact issues with reviewable edits.
      - Keep the existing stack and interaction model intact.
same_scenario:
  eyebrow: One product, four renderings
  title: Northstar Workspace is the shared demo product.
  description: Every design-ui mode re-renders the same fictional workspace product so the comparison stays honest. Navigation, content modules, and product scope stay stable while typography, spacing, depth, palette, and composition shift by mode.
  product_name: Northstar Workspace
  product_summary: A hybrid docs, dashboard, and workflow product with a top bar, left navigation, KPI summary, project modules, a planning view, and a task table.
  compare_axes:
    - Hero composition
    - Section rhythm
    - Density and spacing
    - Typography posture
    - Artifact staging
    - Scene layout
  workflow_handoff:
    title: Need an audit-first pass instead?
    summary: When the interface already ships code, move to redesign-skill instead of treating redesign as a fifth design-ui mode.
    cta_label: Open redesign-skill
    cta_url: /redesign-skill/
