default_high_agency:
  title: design-ui / default high-agency
  button_label: Copy prompt
  prompt: >-
    Use the design-ui skill in default high-agency mode to redesign this workspace product.
    Keep the current stack, improve hierarchy, spacing, motion, and visual quality, and avoid
    generic AI gradients, generic centered heroes, or repetitive card spam.
minimalist_editorial:
  title: design-ui / minimalist editorial
  button_label: Copy prompt
  prompt: >-
    Use the design-ui skill with the minimalist editorial mode. Make this workspace UI feel calm,
    warm monochrome, typographically sharp, and document-like with restrained motion and crisp borders.
premium_polish:
  title: design-ui / premium polish
  button_label: Copy prompt
  prompt: >-
    Use the design-ui skill with the premium polish mode. Push this workspace product toward a more
    expensive, agency-like feel with stronger depth, nested surfaces, richer motion choreography,
    and cleaner premium hierarchy.
structured_technical:
  title: design-ui / structured technical
  button_label: Copy prompt
  prompt: >-
    Use the design-ui skill with the structured technical mode. Refine this docs and workflow dashboard
    for clarity, modular layout, geometric order, lineart support, and stronger scanability without decorative noise.
redesign_skill:
  title: redesign-skill / audit-first workflow
  button_label: Copy prompt
  prompt: >-
    Use the redesign-skill on this existing app. Keep the current framework and feature set, scan the codebase first,
    diagnose the biggest visual problems, then apply the smallest set of high-impact UI fixes and verify everything stays reviewable.
