          src: /assets/img/previews/premium-polish/hero.svg
          alt: Premium polish launch-grade hero with layered product staging.
          caption: The first fold reads like a premium reveal, not a generic product explainer.
        callout:
          title: Why it works
          body: Material hierarchy makes the product feel crafted. One highlighted artifact leads; secondary panels step back but still feel intentional.
