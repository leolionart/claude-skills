{% assign header = site.data.site.header %}
<header class="site-header" data-site-header>
  <div class="shell nav-shell">
    <div class="brand-lockup">
      <p class="eyebrow">{{ site.data.site.brand.eyebrow }}</p>
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.data.site.brand.label }}</a>
    </div>

    <nav class="top-nav" aria-label="Primary">
      {% for item in header.links %}
        <a href="{{ item.url | relative_url }}">{{ item.label }}</a>
      {% endfor %}
    </nav>

    <div class="header-actions">
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
      </button>
      <a class="button button-header" href="{{ header.cta.url | relative_url }}">{{ header.cta.label }}</a>
    </div>
  </div>
</header>
