          - label: Halo zone
            text: Controlled light draws attention to the hero artifact without coating the whole page in effects.
          - label: Nested surface
            text: Panels sit in a depth stack so importance is felt physically, not only read from type size.
          - label: Premium CTA
            text: Call-to-action surfaces feel staged and launch-ready instead of merely functional.
      - type: principles_rail
        eyebrow: Principles rail
        title: Material rules for this rendering
        description: Premium polish should feel deliberate, never noisy.
        items:
          - title: Depth must clarify
            body: Layers should explain hierarchy and focus, not create arbitrary visual fog.
          - title: Make space more theatrical
            body: Use larger negative-space islands so key artifacts feel spotlighted and expensive.
          - title: Choreograph surfaces
            body: Keep transitions and overlaps soft, elevated, and intentional.
      - type: proof_strip
        eyebrow: Visual DNA
        title: Signature reads
        description: The mode should be recognizable through materiality and pacing.
        items:
          - Nested premium surfaces
          - Hairlines and glow accents
          - Richer motion choreography
          - Cinematic rhythm
      - type: comparison_band
        eyebrow: Avoid framing
        title: Not marketing noise. Not decorative spectacle.
        description: This is still the shared workspace product. The goal is expensive clarity on the same scenario, not turning the site into a motion-drunk promo page.
