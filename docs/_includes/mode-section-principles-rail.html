<section class="shell section section-showcase section-mode-block section-mode-principles">
  <div class="mode-block-heading stack-md">
    <p class="section-kicker">{{ include.section.eyebrow }}</p>
    <h2>{{ include.section.title }}</h2>
    <p>{{ include.section.description }}</p>
  </div>
  <div class="principles-rail" aria-label="{{ include.section.title }}">
    {% for principle in include.section.items %}
      <article class="principle-card stack-md">
        <p class="meta-label">0{{ forloop.index }}</p>
        <h3>{{ principle.title }}</h3>
        <p>{{ principle.body }}</p>
      </article>
    {% endfor %}
  </div>
</section>
