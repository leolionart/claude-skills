headline: redesign-skill is a workflow, not a fifth style card.
summary: Use it when the project already exists and the safest path is to audit what is there, improve the highest-impact problems, and keep changes reviewable.
prompt_key: redesign_skill
preview_asset: /assets/img/previews/redesign-workflow.svg
preview_alt: Process-oriented redesign preview showing scan, diagnose, fix, and verify steps for an existing product.
steps:
  - step: "1"
    label: Scan
    description: Read the repo, identify framework, styling system, component patterns, and missing states.
  - step: "2"
    label: Diagnose
    description: Audit typography, color, surfaces, layout, interactivity, iconography, and code quality.
  - step: "3"
    label: Fix
    description: Apply the smallest set of changes that noticeably improves the design without breaking behavior.
  - step: "4"
    label: Verify
    description: Confirm the stack still fits, imports are real, and the redesign remains reviewable and low-risk.
rules:
  - Work with the existing stack; do not migrate frameworks or styling systems.
  - Keep changes focused and reviewable.
  - Check dependencies before importing libraries.
  - Prefer targeted improvements over sweeping rewrites.
  - Preserve functionality and content structure unless the task explicitly allows deeper redesign.
